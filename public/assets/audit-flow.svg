<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow audit process</title>
  <desc id="desc">A monochrome process diagram from source notes to evaluation gate and public boundary.</desc>
  <rect width="1120" height="360" fill="#F5F4EF"/>
  <line x1="84" y1="78" x2="84" y2="290" stroke="#D4D3CB" stroke-width="2"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect x="78" y="92" width="12" height="12" fill="#111827"/>
    <text x="122" y="104" fill="#686868" font-size="16">source</text>
    <text x="122" y="134" fill="#07090D" font-size="22" font-weight="700">Workflow notes</text>
    <text x="122" y="164" fill="#686868" font-size="16">Owners, inputs, risks, and context boundaries.</text>

    <rect x="78" y="190" width="12" height="12" fill="#111827"/>
    <rect x="116" y="176" width="480" height="76" fill="#FFFFFF" stroke="#07090D" stroke-width="2"/>
    <rect x="122" y="182" width="480" height="76" fill="none" stroke="#07090D" stroke-width="2"/>
    <text x="146" y="206" fill="#686868" font-size="16">evaluation</text>
    <text x="146" y="236" fill="#07090D" font-size="22" font-weight="700">Small cases before claims</text>

    <rect x="78" y="284" width="12" height="12" fill="#111827"/>
    <text x="122" y="296" fill="#686868" font-size="16">boundary</text>
    <text x="122" y="326" fill="#07090D" font-size="22" font-weight="700">Synthetic public output only</text>

    <path d="M650 214H910" stroke="#07090D" stroke-width="2"/>
    <path d="M890 194L912 214L890 234" stroke="#07090D" stroke-width="2"/>
    <text x="650" y="174" fill="#07090D" font-size="20" font-weight="700">inspectable experiment</text>
    <text x="650" y="254" fill="#686868" font-size="16">No private people, employer data, or raw rooms.</text>
  </g>
</svg>
