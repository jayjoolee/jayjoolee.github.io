<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sample audit report preview</title>
  <desc id="desc">Preview of the generated audit report sections and pilot decision snapshot.</desc>
  <rect width="1120" height="520" rx="18" fill="#F8FAFC"/>
  <rect x="40" y="40" width="1040" height="440" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="80" y="92" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">AI Workflow Audit Report</text>
  <text x="80" y="122" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Executive snapshot generated from synthetic workflow data</text>

  <rect x="80" y="158" width="300" height="118" rx="12" fill="#ECFEFF" stroke="#67E8F9"/>
  <text x="104" y="192" fill="#155E75" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Top pilot candidate</text>
  <text x="104" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16">Normalize and segment feedback</text>
  <text x="104" y="248" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">AI fit 78/100 · high</text>

  <rect x="410" y="158" width="300" height="118" rx="12" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="434" y="192" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Responsible capture</text>
  <text x="434" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16">Process playbook only</text>
  <text x="434" y="248" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Skill-capture risk 23/100 · low</text>

  <rect x="740" y="158" width="300" height="118" rx="12" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="764" y="192" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Eval gate</text>
  <text x="764" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16">20/20 synthetic cases pass</text>
  <text x="764" y="248" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">7/7 safety-critical cases pass</text>

  <text x="80" y="330" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Generated sections</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">
    <text x="100" y="370">01 Workflow map</text>
    <text x="310" y="370">02 AI use-case candidates</text>
    <text x="560" y="370">03 Risks and guardrails</text>
    <text x="810" y="370">04 KPI recommendations</text>
    <text x="100" y="410">05 Responsible Skill Capture Protocol</text>
    <text x="410" y="410">06 Contextual Eval Package</text>
    <text x="680" y="410">07 Adoption roadmap</text>
  </g>
</svg>
